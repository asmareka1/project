<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طه محمد | Taha Mohamed</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #0ea5e9;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        /* حيوية الخلفية */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(-45deg, #020617, #0f172a, #1e293b, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* تأثير شاشة الترحيب */
        #welcome-screen {
            position: fixed;
            inset: 0;
            background: #020617;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .welcome-card {
            text-align: center;
            padding: 40px;
            border-radius: 30px;
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .enter-btn {
            margin-top: 25px;
            padding: 15px 45px;
            background: var(--accent);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 900;
            cursor: pointer;
            font-family: 'Cairo';
            transition: 0.4s;
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.5);
        }

        .enter-btn:hover { transform: scale(1.1) rotate(-2deg); box-shadow: 0 0 40px var(--accent); }

        /* أيقونة المعلومات المتحركة */
        .info-toggle {
            position: fixed;
            top: 25px;
            right: 25px;
            background: var(--glass);
            border: 1px solid var(--border);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 2100;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .info-toggle:hover { transform: scale(1.2) rotate(180deg); border-color: var(--accent); }

        .sidebar {
            position: fixed;
            right: -320px;
            top: 0;
            width: 280px;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(25px);
            border-left: 2px solid var(--accent);
            z-index: 2000;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sidebar.active { right: 0; }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 30px;
            object-fit: cover;
            border: 4px solid var(--accent);
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.5s;
        }

        .profile-img:hover { transform: scale(1.05) rotate(3deg); }

        .social-icon:hover { background: var(--accent); transform: translateY(-8px) scale(1.2); }

        /* الحاوية الرئيسية */
        .container {
            width: 85%;
            max-width: 400px;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 60px 30px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .btn-link {
            display: block;
            padding: 20px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-weight: 900;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-link:hover {
            background: var(--accent);
            color: white;
            transform: translateX(-10px);
            border-color: white;
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-card">
            <h1 style="margin:0; font-weight:900;">مرحباً بك</h1>
            <p style="color:var(--accent); margin:10px 0 0; font-size:1.2rem;">مشاريع طه محمد</p>
            <button class="enter-btn" onclick="enterSite()">ابدأ الاستكشاف</button>
        </div>
    </div>

    <div class="info-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars-staggered" style="color: var(--accent);"></i>
    </div>

    <div class="sidebar" id="sidebar">
        <!-- الرابط الجديد المباشر للصورة -->
        <img src="https://i.ibb.co/sdfggY63/Whats-App-Image-2026-04-30-at-12-42-44-AM.jpg" alt="طه محمد" class="profile-img">
        
        <div class="user-info" style="text-align: center;">
            <h3 style="margin: 0; font-weight: 900;">طه محمد حسن</h3>
            <p style="margin: 10px 0;"><i class="fas fa-school" style="color:var(--accent)"></i> مدرسة أحمد طه حسين</p>
            <p style="margin: 10px 0;"><i class="fas fa-id-card" style="color:var(--accent)"></i> الصف الأول الثانوي</p>
        </div>

        <div class="social-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; margin-top:25px;">
            <a href="https://wa.me/qr/Q5PSP4YRWIO5O1" target="_blank" style="width:48px; height:48px; background:rgba(255,255,255,0.05); border-radius:12px; display:flex; justify-content:center; align-items:center; color:white; text-decoration:none; border:1px solid var(--border); transition:0.3s;"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.facebook.com/share/1Aua8HfkoD/" target="_blank" style="width:48px; height:48px; background:rgba(255,255,255,0.05); border-radius:12px; display:flex; justify-content:center; align-items:center; color:white; text-decoration:none; border:1px solid var(--border); transition:0.3s;"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/asmareka_1?igsh=MW53czkwcHNxZmVjbA==" target="_blank" style="width:48px; height:48px; background:rgba(255,255,255,0.05); border-radius:12px; display:flex; justify-content:center; align-items:center; color:white; text-decoration:none; border:1px solid var(--border); transition:0.3s;"><i class="fab fa-instagram"></i></a>
        </div>
    </div>

    <div class="container">
        <h2 style="font-size: 2.5rem; margin: 0; font-weight: 900;">المشاريع</h2>
        <p style="color: #94a3b8; margin-bottom: 40px; font-size: 1.1rem;">استعرض آخر الاعمال البرمجية</p>
        
        <a href="https://calculators-taha.netlify.app/" target="_blank" class="btn-link">مشروع الآلة الحاسبة 📱</a>
        <a href="https://asal-ai.netlify.app/" target="_blank" class="btn-link">مشروع منصة إسأل لحل الأسئلة 🤖</a>
    </div>

    <script>
        function enterSite() {
            const screen = document.getElementById('welcome-screen');
            screen.style.transform = 'scale(1.5)';
            screen.style.opacity = '0';
            setTimeout(() => { screen.style.display = 'none'; }, 800);
        }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }
    </script>
</body>
</html>
